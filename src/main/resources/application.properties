# Nombre de la aplicacion Spring Boot.
spring.application.name=${APP_NAME}

# Puerto HTTP donde se levanta la API.
server.port=${PORT}
# Direccion de red donde escucha el servidor.
server.address=${SERVER_ADDRESS}
# Controla si las respuestas de error incluyen stacktrace.
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE}
# Controla si las respuestas de error incluyen el mensaje interno.
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE}
# Activa o desactiva la pagina de error generica de Spring Boot.
server.error.whitelabel.enabled=${SERVER_ERROR_WHITELABEL_ENABLED}
# Ajusta los headers X-Forwarded-* cuando la app esta detras de un proxy o balanceador.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY}
# Tipo de apagado del servidor HTTP.
server.shutdown=${SERVER_SHUTDOWN}
# Tiempo maximo que Spring espera durante el apagado ordenado.
spring.lifecycle.timeout-per-shutdown-phase=${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE}
# Activa compresion HTTP en respuestas compatibles.
server.compression.enabled=${SERVER_COMPRESSION_ENABLED}
# Tipos MIME que Spring puede comprimir.
server.compression.mime-types=${SERVER_COMPRESSION_MIME_TYPES}
# Tamano minimo de respuesta para activar compresion.
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_RESPONSE_SIZE}

# URL JDBC de conexion a PostgreSQL.
spring.datasource.url=${DB_URL}
# Usuario de la base de datos.
spring.datasource.username=${DB_USERNAME}
# Password de la base de datos.
spring.datasource.password=${DB_PASSWORD}
# Driver JDBC usado por Spring para conectarse a PostgreSQL.
spring.datasource.driver-class-name=${DB_DRIVER}
# Maximo de conexiones simultaneas en el pool Hikari.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE}
# Minimo de conexiones inactivas que Hikari intenta mantener listas.
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE}
# Tiempo maximo en milisegundos que una conexion puede estar inactiva.
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT}
# Vida maxima en milisegundos de una conexion dentro del pool.
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME}
# Tiempo maximo en milisegundos para obtener una conexion del pool.
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT}
# Tiempo maximo en milisegundos para validar una conexion.
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT}
# Intervalo en milisegundos para enviar keepalive a conexiones ociosas.
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME}

# Dialecto SQL que Hibernate usa para PostgreSQL.
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM}
# Estrategia de Hibernate para crear, validar o no tocar el esquema.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
# Activa o desactiva la impresion de consultas SQL generadas por Hibernate.
spring.jpa.show-sql=${JPA_SHOW_SQL}
# Formatea las consultas SQL en logs cuando se imprimen.
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}
# Zona horaria usada por Hibernate al trabajar con fechas en JDBC.
spring.jpa.properties.hibernate.jdbc.time_zone=${HIBERNATE_JDBC_TIME_ZONE}
# Evita consultas lazy fuera de la capa de aplicacion.
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW}

# Activa Flyway para gestionar el esquema de base de datos mediante migraciones versionadas.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
# Permite adoptar Flyway sobre una base ya existente sin perder datos en la primera ejecucion.
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

# Nivel de logs para las sentencias SQL de Hibernate.
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL}
# Nivel de logs para los parametros enlazados por Hibernate.
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BINDER}
# Nivel de logs para Spring Web.
logging.level.org.springframework.web=${LOGGING_LEVEL_SPRING_WEB}
# Nivel de logs para Spring Security.
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY}
# Nivel de logs para el codigo de la aplicacion.
logging.level.com.keax=${LOGGING_LEVEL_APP}
# Nivel de logs para la carga de configuracion de Spring Boot.
logging.level.org.springframework.boot.context.config=${LOGGING_LEVEL_CONFIG}

# Origenes permitidos para peticiones CORS desde el frontend.
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${APP_API_URL_FRONTEND}}
# Metodos HTTP permitidos por CORS.
spring.web.cors.allowed-methods=${CORS_ALLOWED_METHODS}
# Headers permitidos por CORS.
spring.web.cors.allowed-headers=${CORS_ALLOWED_HEADERS}
# Permite o bloquea credenciales en peticiones CORS.
spring.web.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS}

# Path base donde se publican los endpoints operativos de Actuator.
management.endpoints.web.base-path=${MANAGEMENT_ENDPOINTS_BASE_PATH:/actuator}
# Endpoints expuestos por HTTP para healthchecks y scraping de métricas.
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
# Activa endpoints de probes para liveness y readiness.
management.endpoint.health.probes.enabled=${MANAGEMENT_HEALTH_PROBES_ENABLED:true}
# Activa el estado interno de liveness del proceso Spring Boot.
management.health.livenessstate.enabled=${MANAGEMENT_HEALTH_LIVENESS_ENABLED:true}
# Activa el estado interno de readiness del proceso Spring Boot.
management.health.readinessstate.enabled=${MANAGEMENT_HEALTH_READINESS_ENABLED:true}
# Define cuándo se exponen detalles del health endpoint.
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}
# Define cuándo se exponen los componentes internos del health endpoint.
management.endpoint.health.show-components=${MANAGEMENT_HEALTH_SHOW_COMPONENTS:when_authorized}
# Configura los indicadores incluidos en liveness.
management.endpoint.health.group.liveness.include=${MANAGEMENT_HEALTH_GROUP_LIVENESS_INCLUDE:livenessState,ping}
# Configura los indicadores incluidos en readiness.
management.endpoint.health.group.readiness.include=${MANAGEMENT_HEALTH_GROUP_READINESS_INCLUDE:readinessState,db,diskSpace,ping}
# Desactiva por defecto el health de SMTP para que una caída del correo no marque caída total de la API.
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
# Habilita la exportación de métricas en formato Prometheus.
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_ENABLED:true}
# Agrega una etiqueta común para identificar la aplicación en el backend de métricas.
management.metrics.tags.application=${APP_NAME}
# Publica histograma de latencia HTTP para análisis de percentiles.
management.metrics.distribution.percentiles-histogram.http.server.requests=${MANAGEMENT_METRICS_HTTP_HISTOGRAM_ENABLED:true}

# Activa la generación del documento OpenAPI.
springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}
# Path HTTP donde se expone el documento OpenAPI en JSON.
springdoc.api-docs.path=${OPENAPI_DOCS_PATH:/v3/api-docs}
# Activa la interfaz Swagger UI.
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:true}
# Path amigable de acceso al HTML de Swagger UI.
springdoc.swagger-ui.path=${SWAGGER_UI_PATH:/swagger-ui.html}
# Ordena operaciones alfabéticamente en la UI.
springdoc.swagger-ui.operations-sorter=${SWAGGER_UI_OPERATIONS_SORTER:alpha}
# Ordena tags alfabéticamente en la UI.
springdoc.swagger-ui.tags-sorter=${SWAGGER_UI_TAGS_SORTER:alpha}
# Evita mezclar endpoints operativos de Actuator dentro de la documentación funcional.
springdoc.show-actuator=${OPENAPI_SHOW_ACTUATOR:false}

# Zona horaria usada por Jackson al serializar y deserializar fechas.
spring.jackson.time-zone=${JACKSON_TIME_ZONE}

# Nombre de la cuenta Cloudinary.
cloudinary.cloud-name=${CL_NAME}
# API key de Cloudinary.
cloudinary.api-key=${CL_KEY}
# API secret de Cloudinary.
cloudinary.api-secret=${CL_SECRET}

# Tamano maximo permitido para un archivo individual.
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE}
# Tamano maximo permitido para una peticion multipart completa.
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE}

# Activa STARTTLS para el servidor SMTP.
spring.mail.properties.mail.smtp.starttls.enable=${GM_SMTP_STARTTLS_ENABLE}
# Activa autenticacion SMTP.
spring.mail.properties.mail.smtp.auth=${GM_SMTP_AUTH}
# Host del servidor SMTP.
spring.mail.host=${GM_HOST}
# Puerto del servidor SMTP.
spring.mail.port=${GM_PORT}
# Usuario de la cuenta SMTP.
spring.mail.username=${GM_USERNAME}
# Password o app password de la cuenta SMTP.
spring.mail.password=${GM_PASSWORD}
# Host confiable para SSL/TLS en SMTP.
spring.mail.properties.mail.smtp.ssl.trust=${GM_TRUST}
# Tiempo maximo de conexion SMTP en milisegundos.
spring.mail.properties.mail.smtp.connectiontimeout=${GM_CONNECTION_TIMEOUT}
# Tiempo maximo de espera de lectura SMTP en milisegundos.
spring.mail.properties.mail.smtp.timeout=${GM_TIMEOUT}
# Tiempo maximo de espera de escritura SMTP en milisegundos.
spring.mail.properties.mail.smtp.writetimeout=${GM_WRITE_TIMEOUT}
# Correo destino para los mensajes enviados desde la aplicacion.
spring.mail.to=${GM_TO}

# Clave secreta usada para firmar tokens JWT.
jwt.secret=${JWT_SECRET}
# Tiempo de expiracion de los tokens JWT en milisegundos.
jwt.expiration-ms=${JWT_EXP}
# URL base del frontend usada por la API para integraciones o respuestas.
app.api.url_frontend=${APP_API_URL_FRONTEND}

# Maximo de mensajes de contacto permitidos por cliente dentro de la ventana.
app.rate-limit.contact.max-requests=${CONTACT_RATE_LIMIT_MAX_REQUESTS:3}
# Ventana de tiempo en milisegundos para limitar mensajes de contacto.
app.rate-limit.contact.window-ms=${CONTACT_RATE_LIMIT_WINDOW_MS:600000}

# Minutos durante los cuales una IP no genera una visita adicional.
app.visitor.dedupe-window-minutes=${VISITOR_DEDUPE_WINDOW_MINUTES:30}
# Solo habilitar si la aplicacion recibe trafico desde un proxy confiable.
app.client-ip.trust-forwarded-headers=${TRUST_FORWARDED_IP_HEADERS:false}
