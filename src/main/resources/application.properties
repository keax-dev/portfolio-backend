# Nombre de la aplicacion Spring Boot.
spring.application.name=${APP_NAME}

# Carga variables desde el .env de la raiz del portfolio y luego desde el .env del backend.
# El .env del backend tiene prioridad cuando ambos archivos definen la misma variable.
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]
# Puerto HTTP donde se levanta la API.
server.port=${PORT}

# Direccion de red donde escucha el servidor.
server.address=${SERVER_ADDRESS}
# Controla si las respuestas de error incluyen stacktrace.
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE}
# Controla si las respuestas de error incluyen el mensaje interno.
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE}


# URL JDBC de conexion a PostgreSQL.
spring.datasource.url=${DB_URL}
# Usuario de la base de datos.
spring.datasource.username=${DB_USERNAME}
# Password de la base de datos.
spring.datasource.password=${DB_PASSWORD}
# Driver JDBC usado por Spring para conectarse a PostgreSQL.
spring.datasource.driver-class-name=${DB_DRIVER}
# Maximo de conexiones simultaneas en el pool Hikari.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE}
# Minimo de conexiones inactivas que Hikari intenta mantener listas.
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE}
# Tiempo maximo en milisegundos que una conexion puede estar inactiva.
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT}
# Vida maxima en milisegundos de una conexion dentro del pool.
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME}


# Dialecto SQL que Hibernate usa para PostgreSQL.
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM}
# Estrategia de Hibernate para crear, validar o no tocar el esquema.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
# Activa o desactiva la impresion de consultas SQL generadas por Hibernate.
spring.jpa.show-sql=${JPA_SHOW_SQL}
# Formatea las consultas SQL en logs cuando se imprimen.
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}
# Zona horaria usada por Hibernate al trabajar con fechas en JDBC.
spring.jpa.properties.hibernate.jdbc.time_zone=${HIBERNATE_JDBC_TIME_ZONE}
# Evita consultas lazy fuera de la capa de aplicacion.
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}


# Nivel de logs para las sentencias SQL de Hibernate.
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL}
# Nivel de logs para los parametros enlazados por Hibernate.
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BINDER}
# Nivel de logs para Spring Web.
logging.level.org.springframework.web=${LOGGING_LEVEL_SPRING_WEB}
# Nivel de logs para el codigo de la aplicacion.
logging.level.com.keax=${LOGGING_LEVEL_APP}
# Nivel de logs para la carga de configuracion de Spring Boot.
logging.level.org.springframework.boot.context.config=${LOGGING_LEVEL_CONFIG}


# Origenes permitidos para peticiones CORS desde el frontend.
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${APP_API_URL_FRONTEND:http://localhost:5173}}
# Metodos HTTP permitidos por CORS.
spring.web.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
# Headers permitidos por CORS.
spring.web.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type}
# Permite o bloquea credenciales en peticiones CORS.
spring.web.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}


# Zona horaria usada por Jackson al serializar y deserializar fechas.
spring.jackson.time-zone=${JACKSON_TIME_ZONE}


# Nombre de la cuenta Cloudinary.
cloudinary.cloud-name=${CL_NAME}
# API key de Cloudinary.
cloudinary.api-key=${CL_KEY}
# API secret de Cloudinary.
cloudinary.api-secret=${CL_SECRET}


# Tamano maximo permitido para un archivo individual.
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE}
# Tamano maximo permitido para una peticion multipart completa.
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE}


# Activa STARTTLS para el servidor SMTP.
spring.mail.properties.mail.smtp.starttls.enable=${GM_SMTP_STARTTLS_ENABLE}
# Activa autenticacion SMTP.
spring.mail.properties.mail.smtp.auth=${GM_SMTP_AUTH}
# Host del servidor SMTP.
spring.mail.host=${GM_HOST}
# Puerto del servidor SMTP.
spring.mail.port=${GM_PORT}
# Usuario de la cuenta SMTP.
spring.mail.username=${GM_USERNAME}
# Password o app password de la cuenta SMTP.
spring.mail.password=${GM_PASSWORD}
# Host confiable para SSL/TLS en SMTP.
spring.mail.properties.mail.smtp.ssl.trust=${GM_TRUST}
# Correo destino para los mensajes enviados desde la aplicacion.
spring.mail.to=${GM_TO}


# Clave secreta usada para firmar tokens JWT.
jwt.secret=${JWT_SECRET}
# Tiempo de expiracion de los tokens JWT en milisegundos.
jwt.expiration-ms=${JWT_EXP}
# URL base del frontend usada por la API para integraciones o respuestas.
app.api.url_frontend=${APP_API_URL_FRONTEND}
