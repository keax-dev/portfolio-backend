# Compose de produccion del backend.
# Descarga una imagen ya publicada en GHCR y la levanta localmente en Lightsail.
#
# Requiere dos archivos en la carpeta de despliegue:
# - .env.prod    -> lo genera el workflow con el tag exacto de la imagen
# - .env         -> lo mantienes manualmente con variables reales del backend
#
# Usa network_mode host para que el contenedor vea los mismos servicios locales del servidor,
# por ejemplo PostgreSQL en localhost:5432.
# Una vez retirado el backend manual, el contenedor queda escuchando directamente
# en 127.0.0.1:8080 dentro del host.
services:
  backend:
    container_name: portfolio-backend
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Comparte la red del host Linux.
    # Esto permite reutilizar DB_URL=jdbc:postgresql://localhost:5432/... sin cambios.
    network_mode: host

    # Carga las variables reales de Spring Boot sin commitear secretos al repositorio.
    env_file:
      - ./.env

    environment:
      # Fuerza el perfil de produccion dentro del contenedor.
      SPRING_PROFILES_ACTIVE: prod
      # Como se comparte la red del host, el backend puede exponerse solo en loopback.
      SERVER_ADDRESS: 127.0.0.1
      # Puerto real que consumira Nginx localmente en el host.
      PORT: 8080

    # Healthcheck adicional visible desde Docker Compose.
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', 'http://127.0.0.1:8080/actuator/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
